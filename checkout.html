<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الشراء | EduTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f4f7f6; --card: #ffffff; --text: #1e293b; --success: #10b981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        .checkout-header { background: linear-gradient(135deg, #3730a3 0%, #4f46e5 100%); color: white; padding: 50px 20px; text-align: center; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .checkout-header h1 { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        .checkout-header p { opacity: 0.9; font-size: 15px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap-reverse; }
        
        /* قسم الفورم */
        .form-section { flex: 2; min-width: 300px; background: var(--card); padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        .section-title { font-size: 18px; font-weight: 900; margin-bottom: 25px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #475569; font-size: 14px; }
        .custom-input { width: 100%; padding: 14px 15px; border-radius: 10px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 15px; outline: none; transition: 0.3s; font-weight: bold; color: var(--text); }
        .custom-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        .payment-methods { display: flex; gap: 15px; margin-bottom: 25px; }
        .pay-method { flex: 1; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; color: #64748b; background: #f8fafc; }
        .pay-method input { display: none; }
        .pay-method.active { border-color: var(--primary); background: rgba(79, 70, 229, 0.05); color: var(--primary); }
        
        .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }
        .submit-btn:hover { background: #4338ca; transform: translateY(-2px); }

        /* ملخص الطلب (تصميم الفاتورة الشيك) */
        .summary-section { flex: 1; min-width: 320px; position: sticky; top: 20px; }
        .receipt-card { background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .receipt-header { background: var(--bg); padding: 25px 20px; text-align: center; border-bottom: 2px dashed #cbd5e1; }
        .receipt-header h2 { font-size: 22px; color: var(--primary); font-weight: 900; margin-bottom: 5px; }
        .receipt-header p { font-size: 13px; color: #64748b; }
        
        .receipt-body { padding: 25px 20px; }
        .receipt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 15px; color: #475569; font-weight: bold; }
        .receipt-row.discount { color: var(--success); display: none; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 8px; margin: 15px 0; }
        .receipt-row.total { font-size: 22px; color: var(--primary); padding-top: 20px; margin-top: 10px; border-top: 2px solid #e2e8f0; font-weight: 900; }
        
        .promo-box { background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); padding: 20px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .promo-btn { width: 100%; padding: 12px; background: rgba(79, 70, 229, 0.1); color: var(--primary); border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .promo-btn:hover { background: var(--primary); color: white; }

        /* نافذة النجاح */
        .success-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 99999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .success-content { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; animation: popIn 0.4s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) { .container { flex-direction: column-reverse; } .summary-section, .form-section { width: 100%; } }
    </style>
</head>
<body>

    <header class="checkout-header">
        <h1>إتمام عملية الشراء 🛒</h1>
        <p>اكمل بياناتك أدناه لإنشاء حسابك وتأكيد طلبك</p>
    </header>

    <div class="container">
        <div class="form-section">
            <div class="section-title">👤 معلومات الحساب</div>
            <form id="checkoutForm">
                <div class="input-group">
                    <label>اسم المدرس أو السنتر <span style="color:red">*</span></label>
                    <input type="text" id="teacherName" class="custom-input" placeholder="مثال: مستر أحمد محمد" required>
                </div>
                <div class="input-group">
                    <label>رقم الواتساب للتواصل والتفعيل <span style="color:red">*</span></label>
                    <input type="tel" id="whatsappNumber" class="custom-input" placeholder="01XXXXXXXXX" pattern="[0-9]{11}" required>
                </div>

                <div class="section-title" style="margin-top: 35px;">💳 طريقة الدفع</div>
                <div class="payment-methods">
                    <label class="pay-method active" id="lbl-wallet">
                        <input type="radio" name="payment" value="محفظة كاش" checked onchange="changePayment('wallet')">📱 فودافون كاش
                    </label>
                    <label class="pay-method" id="lbl-fawry">
                        <input type="radio" name="payment" value="كود فوري" onchange="changePayment('fawry')">🏪 كود فوري
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="payBtn">تأكيد الطلب</button>
            </form>
        </div>

        <div class="summary-section">
            <div class="receipt-card">
                <div class="receipt-header">
                    <h2 id="summaryPlanName">جاري التحميل...</h2>
                    <p id="summaryPlanDesc">...</p>
                </div>
                <div class="receipt-body">
                    <div class="receipt-row">
                        <span>السعر الأساسي:</span>
                        <strong id="basePriceUI">0 ج.م</strong>
                    </div>
                    <div class="receipt-row discount" id="discountRow">
                        <span>خصم الإحالة:</span>
                        <strong id="discountUI">- 0 ج.م</strong>
                    </div>
                    <div class="receipt-row total">
                        <span>المطلوب دفعه:</span>
                        <strong id="totalPriceUI">0 ج.م</strong>
                    </div>
                </div>
            </div>
            
            <div class="promo-box">
                <label style="display: block; font-weight: 900; color: #1e293b; margin-bottom: 10px;">🏷️ كود الإحالة (اختياري)</label>
                <input type="text" id="promoCodeInput" class="custom-input" placeholder="أدخل كود الخصم..." style="text-align: center; letter-spacing: 2px;">
                <button type="button" class="promo-btn" onclick="applyPromoCode()">تطبيق الخصم</button>
                <div id="promoMsg" style="margin-top: 10px; font-size: 13px; font-weight: bold; text-align: center; display: none;"></div>
            </div>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div style="font-size: 70px; margin-bottom: 10px;">🎉</div>
            <h2 style="color: var(--primary); margin-bottom: 15px;">تم تسجيل طلبك بنجاح!</h2>
            <p style="color: #64748b; margin-bottom: 25px; line-height: 1.6;">تم إرسال طلبك للإدارة. سنتواصل معك فوراً على الواتساب لإتمام الدفع وتفعيل حسابك.</p>
            <button class="submit-btn" style="width: auto; padding: 10px 30px;" onclick="window.location.href='landing.html'">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        function changePayment(method) {
            document.getElementById('lbl-wallet').classList.remove('active');
            document.getElementById('lbl-fawry').classList.remove('active');
            document.getElementById('lbl-' + method).classList.add('active');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'monthly'; 
        const DB_URL = "https://edutrack-system-1ded4-default-rtdb.firebaseio.com";

        const plansInfo = {
             'demo': { name: 'التجربة المجانية', desc: 'سارية لمدة 7 أيام للتقييم', price: 0 },
            'monthly': { name: 'الاشتراك الشهري', desc: 'سيرفرات واتساب ومتابعة سارية لمدة 30 يوماً', price: 400 },
            'lifetime': { name: 'باقة مدى الحياة', desc: 'شراء النسخة نهائياً + سيرفرات تعمل بلا توقف', price: 5000 }
        };

        const currentPlan = plansInfo[plan] || plansInfo['monthly'];
        let appliedDiscount = 0;
        let appliedPromoCode = "";
        let affiliateCommission = 0;

        function initPricing() {
            document.getElementById('summaryPlanName').innerText = currentPlan.name;
            document.getElementById('summaryPlanDesc').innerText = currentPlan.desc;
            document.getElementById('basePriceUI').innerText = `${currentPlan.price} ج.م`;
            updateTotals();
        }

        function updateTotals() {
            const finalPrice = currentPlan.price - appliedDiscount;
            document.getElementById('totalPriceUI').innerText = `${finalPrice} ج.م`;
            document.getElementById('payBtn').innerText = `تأكيد الطلب (${finalPrice} ج.م)`;
            
            if (appliedDiscount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountUI').innerText = `- ${appliedDiscount} ج.م`;
            } else {
                document.getElementById('discountRow').style.display = 'none';
            }
        }

        function applyPromoCode() {
            const code = document.getElementById('promoCodeInput').value.trim().toUpperCase();
            const msgBox = document.getElementById('promoMsg');
            msgBox.style.display = 'block';

            if (code.startsWith("REF-") && code.length >= 8) {
                appliedPromoCode = code;
                appliedDiscount = plan === 'lifetime' ? 500 : 100;
                affiliateCommission = plan === 'lifetime' ? 800 : 150; // عمولة المدرس اللي جابه
                
                msgBox.style.color = 'var(--success)';
                msgBox.innerText = `✅ تم تفعيل الكود! خصم ${appliedDiscount} ج.م`;
            } else {
                appliedPromoCode = ""; appliedDiscount = 0; affiliateCommission = 0;
                msgBox.style.color = 'var(--danger)';
                msgBox.innerText = "❌ الكود غير صحيح.";
            }
            updateTotals();
        }

        initPricing();

        // إرسال الطلب مباشرة لقاعدة البيانات (بدون واتساب)
        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            btn.innerText = "جاري إرسال الطلب... ⏳";
            btn.disabled = true;

            const orderData = {
                teacherName: document.getElementById('teacherName').value.trim(),
                whatsapp: document.getElementById('whatsappNumber').value.trim(),
                paymentMethod: document.querySelector('input[name="payment"]:checked').value,
                plan: currentPlan.name,
                finalPrice: currentPlan.price - appliedDiscount,
                promoCodeUsed: appliedPromoCode || "بدون كود",
                commissionForAffiliate: affiliateCommission, // هنحتاجها في الداشبورد
                status: "قيد الانتظار ⏳",
                timestamp: new Date().toISOString()
            };

            try {
                // رمي الداتا في جدول جديد اسمه orders
                await fetch(`${DB_URL}/orders.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                document.getElementById("successModal").style.display = "flex";
            } catch (error) {
                btn.innerText = "حدث خطأ، حاول مرة أخرى";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
