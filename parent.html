<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ولي الأمر | EduTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; margin: 0; color: #1f2937; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .logo { text-align: center; color: #1e3a8a; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .custom-input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; background: #10b981; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #059669; }
        .error { color: #ef4444; text-align: center; font-weight: bold; margin-top: 15px; display: none; }
        
        /* شاشة النتيجة */
        #result-screen { display: none; }
        .student-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px dashed #e5e7eb; }
        .stat-box { display: flex; justify-content: space-between; padding: 15px; background: #fffbeb; border-radius: 8px; border-right: 4px solid #f59e0b; margin-top: 10px; }
        
        /* الجداول والتفاصيل */
        .section-title { font-size: 16px; font-weight: bold; color: #1e3a8a; margin-top: 25px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .scrollable-section { max-height: 250px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .detail-table th, .detail-table td { padding: 12px 10px; text-align: right; border-bottom: 1px solid #f3f4f6; }
        .detail-table th { background: #f9fafb; color: #4b5563; position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .detail-table tr:last-child td { border-bottom: none; }
        
        /* الشارات (Badges) */
        .badge-present { color: #059669; background: #d1fae5; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 11px; }
        .badge-absent { color: #dc2626; background: #fee2e2; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 11px; }
        .badge-none { color: #64748b; font-size: 12px; }
        .score-box { font-weight: bold; color: #1e3a8a; font-size: 14px; }
        .score-max { font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <div class="logo">EduTrack Portal</div>
        <div class="subtitle">بوابة متابعة أولياء الأمور</div>
        
        <div class="input-group">
            <label>كود الطالب</label>
            <input type="text" id="studentCode" class="custom-input" placeholder="أدخل كود الطالب">
        </div>
        <div class="input-group">
            <label>رقم هاتف ولي الأمر</label>
            <input type="text" id="parentPhone" class="custom-input" placeholder="أدخل رقمك المسجل بالسنتر">
        </div>
        <button class="btn" onclick="fetchStudentData()">عرض التقرير 📊</button>
        <div id="error-msg" class="error">البيانات غير صحيحة أو غير مسجلة!</div>
    </div>

    <div class="container" id="result-screen">
        <div class="student-header">
            <h2 id="s-name" style="margin: 0; color: #1e3a8a;">اسم الطالب</h2>
            <p id="s-group" style="margin: 5px 0 0 0; color: #6b7280; font-weight: bold;">المجموعة</p>
            
            <div class="stat-box">
                <span style="font-weight: bold; color: #4b5563;">🌟 نقاط التميز (السلوك)</span>
                <span id="s-behavior" style="font-weight: bold; font-size: 18px; color: #f59e0b;">0</span>
            </div>
        </div>
        
        <div class="section-title">📅 سجل الحضور والغياب</div>
        <div class="scrollable-section">
            <table class="detail-table" id="attendance-details">
                </table>
        </div>

        <div class="section-title">📝 سجل الامتحانات</div>
        <div class="scrollable-section">
            <table class="detail-table" id="exams-details">
                </table>
        </div>

        <div class="section-title">📚 سجل الواجبات</div>
        <div class="scrollable-section">
            <table class="detail-table" id="hw-details">
                </table>
        </div>
        
        <button class="btn" style="margin-top: 25px; background: #64748b;" onclick="location.reload()">عودة للبحث 🔙</button>
    </div>

    <script>
        async function fetchStudentData() {
            const code = document.getElementById("studentCode").value.trim();
            const phone = document.getElementById("parentPhone").value.trim();
            const errorMsg = document.getElementById("error-msg");
            
            const urlParams = new URLSearchParams(window.location.search);
            const teacherId = urlParams.get('id');

            if (!code || !phone || !teacherId) {
                errorMsg.style.display = "block";
                errorMsg.innerText = !teacherId ? "رابط غير صالح! يرجى استخدام الرابط المرسل من المدرس." : "يرجى إدخال الكود ورقم الهاتف!";
                return;
            }

            errorMsg.style.display = "none";
            document.querySelector('.btn').innerText = "جاري البحث... ⏳";

            try {
                let res = await fetch(`https://edutrack-system-1ded4-default-rtdb.firebaseio.com/teachers/${teacherId}/data.json`);
                let data = await res.json();

                if (!data || !data.students) throw new Error();

                const student = data.students.find(s => s && s.code === code && s.parentPhone === phone);
                
                if (!student) {
                    errorMsg.style.display = "block";
                    errorMsg.innerText = "هذا الطالب غير مسجل لدينا، أو البيانات غير متطابقة!";
                    document.querySelector('.btn').innerText = "عرض التقرير 📊";
                    return;
                }

                // --- تعبئة البيانات الأساسية ---
                document.getElementById("s-name").innerText = student.name;
                document.getElementById("s-group").innerText = student.group;
                document.getElementById("s-behavior").innerText = student.behaviorPoints || 0;

                // --- 1. بناء جدول الحضور ---
                let attHtml = `<tr><th>التاريخ</th><th>الحصة</th><th>الحالة</th></tr>`;
                // جلب حصص المجموعة وعكسها عشان الأحدث يظهر فوق
                let groupSessions = (data.classSessions || []).filter(s => s && s.group === student.group).reverse(); 
                if (groupSessions.length === 0) {
                    attHtml += `<tr><td colspan="3" style="text-align:center; color:#6b7280;">لا توجد حصص مسجلة</td></tr>`;
                } else {
                    groupSessions.forEach(s => {
                        let status = s.attendance[student.phone];
                        let badge = status === 'present' ? `<span class="badge-present">حاضر ✓</span>` : 
                                   (status === 'absent' ? `<span class="badge-absent">غائب ✗</span>` : `<span class="badge-none">--</span>`);
                        attHtml += `<tr><td>${s.date}</td><td>${s.topic || 'حصة'}</td><td>${badge}</td></tr>`;
                    });
                }
                document.getElementById("attendance-details").innerHTML = attHtml;

                // --- 2. بناء جدول الامتحانات ---
                let examHtml = `<tr><th>التاريخ</th><th>الامتحان</th><th>الدرجة</th></tr>`;
                let groupExams = (data.exams || []).filter(e => e && e.group === student.group).reverse();
                if (groupExams.length === 0) {
                    examHtml += `<tr><td colspan="3" style="text-align:center; color:#6b7280;">لا توجد امتحانات مسجلة</td></tr>`;
                } else {
                    groupExams.forEach(e => {
                        let grade = e.grades[student.phone];
                        let gradeText = grade !== undefined ? 
                            `<span class="score-box">${grade} <span class="score-max">/ ${e.maxScore}</span></span>` : 
                            `<span class="badge-none">لم يمتحن</span>`;
                        examHtml += `<tr><td>${e.date}</td><td>${e.name}</td><td>${gradeText}</td></tr>`;
                    });
                }
                document.getElementById("exams-details").innerHTML = examHtml;

                // --- 3. بناء جدول الواجبات ---
                let hwHtml = `<tr><th>التاريخ</th><th>الواجب</th><th>الدرجة</th></tr>`;
                let groupHw = (data.homeworks || []).filter(h => h && h.group === student.group).reverse();
                if (groupHw.length === 0) {
                    hwHtml += `<tr><td colspan="3" style="text-align:center; color:#6b7280;">لا توجد واجبات مسجلة</td></tr>`;
                } else {
                    groupHw.forEach(h => {
                        let grade = h.grades[student.phone];
                        let gradeText = grade !== undefined ? 
                            `<span class="score-box">${grade} <span class="score-max">/ ${h.maxScore}</span></span>` : 
                            `<span class="badge-none">لم يسلم</span>`;
                        hwHtml += `<tr><td>${h.date}</td><td>${h.name}</td><td>${gradeText}</td></tr>`;
                    });
                }
                document.getElementById("hw-details").innerHTML = hwHtml;

                // إظهار النتيجة
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("result-screen").style.display = "block";

            } catch (e) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "حدث خطأ في الاتصال بالسحابة!";
                document.querySelector('.btn').innerText = "عرض التقرير 📊";
            }
        }
    </script>
</body>
</html>
