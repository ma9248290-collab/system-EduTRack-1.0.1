<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة ولي الأمر | EduTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; margin: 0; color: #1f2937; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { text-align: center; color: #1e3a8a; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .custom-input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; background: #10b981; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #059669; }
        .error { color: #ef4444; text-align: center; font-weight: bold; margin-top: 15px; display: none; }
        
        /* شاشة النتيجة */
        #result-screen { display: none; }
        .student-header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px dashed #e5e7eb; }
        .stat-box { display: flex; justify-content: space-between; padding: 15px; background: #f9fafb; border-radius: 8px; margin-bottom: 10px; border-right: 4px solid #1e3a8a; }
        .stat-box.success { border-color: #10b981; }
        .stat-box.warning { border-color: #f59e0b; }
        .stat-box.danger { border-color: #ef4444; }
        .stat-title { font-weight: bold; color: #4b5563; }
        .stat-value { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div class="container" id="login-screen">
        <div class="logo">EduTrack Portal</div>
        <div class="subtitle">بوابة متابعة أولياء الأمور</div>
        
        <div class="input-group">
            <label>كود الطالب</label>
            <input type="text" id="studentCode" class="custom-input" placeholder="أدخل كود الطالب">
        </div>
        <div class="input-group">
            <label>رقم هاتف ولي الأمر</label>
            <input type="text" id="parentPhone" class="custom-input" placeholder="أدخل رقمك المسجل بالسنتر">
        </div>
        <button class="btn" onclick="fetchStudentData()">عرض التقرير 📊</button>
        <div id="error-msg" class="error">البيانات غير صحيحة أو غير مسجلة!</div>
    </div>

    <!-- شاشة التقرير -->
    <div class="container" id="result-screen">
        <div class="student-header">
            <h2 id="s-name" style="margin: 0; color: #1e3a8a;">اسم الطالب</h2>
            <p id="s-group" style="margin: 5px 0 0 0; color: #6b7280;">المجموعة</p>
        </div>
        
        <div class="stat-box success">
            <span class="stat-title">نسبة الحضور</span>
            <span class="stat-value" id="s-attendance" style="color: #10b981;">0%</span>
        </div>
        <div class="stat-box warning">
            <span class="stat-title">متوسط الامتحانات</span>
            <span class="stat-value" id="s-exams" style="color: #f59e0b;">0%</span>
        </div>
        <div class="stat-box">
            <span class="stat-title">متوسط الواجبات</span>
            <span class="stat-value" id="s-hw" style="color: #1e3a8a;">0%</span>
        </div>
        <div class="stat-box danger">
            <span class="stat-title">نقاط السلوك (التميز)</span>
            <span class="stat-value" id="s-behavior" style="color: #ef4444;">0</span>
        </div>
        
        <button class="btn" style="margin-top: 20px; background: #6b7280;" onclick="location.reload()">عودة للبحث 🔙</button>
    </div>

    <script>
        async function fetchStudentData() {
            const code = document.getElementById("studentCode").value.trim();
            const phone = document.getElementById("parentPhone").value.trim();
            const errorMsg = document.getElementById("error-msg");
            
            // قراءة كود المدرس من رابط الويب (URL Parameter)
            const urlParams = new URLSearchParams(window.location.search);
            const teacherId = urlParams.get('id');

            if (!code || !phone || !teacherId) {
                errorMsg.style.display = "block";
                errorMsg.innerText = !teacherId ? "رابط غير صالح! يرجى استخدام الرابط المرسل من المدرس." : "يرجى إدخال الكود ورقم الهاتف!";
                return;
            }

            errorMsg.style.display = "none";
            document.querySelector('.btn').innerText = "جاري البحث... ⏳";

            try {
                // سحب داتا المدرس من السحابة
                let res = await fetch(`https://edutrack-system-1ded4-default-rtdb.firebaseio.com/teachers/${teacherId}/data.json`);
                let data = await res.json();

                if (!data || !data.students) throw new Error();

                // البحث عن الطالب
                const student = data.students.find(s => s && s.code === code && s.parentPhone === phone);
                
                if (!student) {
                    errorMsg.style.display = "block";
                    errorMsg.innerText = "هذا الطالب غير مسجل لدينا!";
                    document.querySelector('.btn').innerText = "عرض التقرير 📊";
                    return;
                }

                // --- حساب الإحصائيات (نفس منطق البرنامج) ---
                // 1. الحضور
                let attended = 0;
                let groupSessions = (data.classSessions || []).filter(s => s && s.group === student.group);
                groupSessions.forEach(s => { if(s.attendance && s.attendance[student.phone] === 'present') attended++; });
                let attendanceRate = groupSessions.length > 0 ? Math.round((attended / groupSessions.length) * 100) : 0;

                // 2. الامتحانات
                let tExam = 0, sExam = 0;
                let groupExams = (data.exams || []).filter(e => e && e.group === student.group);
                groupExams.forEach(e => {
                    if (e.grades && e.grades[student.phone]) {
                        tExam += parseFloat(e.maxScore);
                        sExam += parseFloat(e.grades[student.phone]);
                    }
                });
                let examRate = tExam > 0 ? Math.round((sExam / tExam) * 100) : 0;

                // 3. الواجبات
                let tHw = 0, sHw = 0;
                let groupHw = (data.homeworks || []).filter(h => h && h.group === student.group);
                groupHw.forEach(h => {
                    if (h.grades && h.grades[student.phone]) {
                        tHw += parseFloat(h.maxScore);
                        sHw += parseFloat(h.grades[student.phone]);
                    }
                });
                let hwRate = tHw > 0 ? Math.round((sHw / tHw) * 100) : 0;

                // عرض النتيجة
                document.getElementById("s-name").innerText = student.name;
                document.getElementById("s-group").innerText = student.group;
                document.getElementById("s-attendance").innerText = attendanceRate + "%";
                document.getElementById("s-exams").innerText = examRate + "%";
                document.getElementById("s-hw").innerText = hwRate + "%";
                document.getElementById("s-behavior").innerText = student.behaviorPoints || 0;

                document.getElementById("login-screen").style.display = "none";
                document.getElementById("result-screen").style.display = "block";

            } catch (e) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "حدث خطأ في الاتصال بالخادم!";
                document.querySelector('.btn').innerText = "عرض التقرير 📊";
            }
        }
    </script>
</body>
</html>
